 fill="#000000" font-family="sans-serif" font-size="12" font-weight="700" lengthAdjust="spacing" textLength="112.7051" x="6" y="266.3945">Resumen calculado</text><text fill="#000000" font-family="sans-serif" font-size="12" font-weight="700" lengthAdjust="spacing" textLength="32.6602" x="8" y="285.4883">Total:</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="49.3594" x="45.6602" y="285.4883">30 h/sem</text><line style="stroke:#000000;stroke-width:1;" x1="43.6602" x2="110.6602" y1="288.125" y2="288.125"/><line style="stroke:#000000;stroke-width:1;" x1="43.6602" x2="43.6602" y1="285.125" y2="287.125"/><line style="stroke:#000000;stroke-width:1;" x1="110.6602" x2="110.6602" y1="285.125" y2="287.125"/><text fill="#000000" font-family="sans-serif" font-size="12" font-weight="700" lengthAdjust="spacing" textLength="102.0234" x="8" y="306.582">Margen docencia:</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="16.6816" x="115.0234" y="306.582">4 h</text><line style="stroke:#000000;stroke-width:1;" x1="113.0234" x2="140.0234" y1="309.2188" y2="309.2188"/><line style="stroke:#000000;stroke-width:1;" x1="113.0234" x2="113.0234" y1="306.2188" y2="308.2188"/><line style="stroke:#000000;stroke-width:1;" x1="140.0234" x2="140.0234" y1="306.2188" y2="308.2188"/><text fill="#000000" font-family="sans-serif" font-size="12" font-weight="700" lengthAdjust="spacing" textLength="44.0039" x="8" y="327.6758">Estado:</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="17.3379" x="57.0039" y="327.6758">OK</text><line style="stroke:#000000;stroke-width:1;" x1="55.0039" x2="75.3418" y1="330.3125" y2="330.3125"/><line style="stroke:#000000;stroke-width:1;" x1="55.0039" x2="55.0039" y1="327.3125" y2="329.3125"/><line style="stroke:#000000;stroke-width:1;" x1="75.3418" x2="75.3418" y1="327.3125" y2="329.3125"/><line style="stroke:#AAAAAA;stroke-