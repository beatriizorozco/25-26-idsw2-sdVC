="sans-serif" font-size="13" lengthAdjust="spacing" textLength="113.6738" x="29" y="405.1592">&#8226; Fecha de solicitud</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="47.1821" x="29" y="421.5107">&#8226; Motivo</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="3.6118" x="29" y="437.8623">&#160;</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="255.8042" x="29" y="454.2139">y presenta la confirmaci&#243;n de desactivaci&#243;n:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="234.3428" x="29" y="470.5654">&#8226; &#191;Est&#225; seguro de desactivar este perfil?</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="399.0835" x="29" y="486.917">&#8226; Advertencia: el acceso se revocar&#225;, pero el hist&#243;rico se conservar&#225;.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="3.6118" x="29" y="503.2686">&#160;</text><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="700" lengthAdjust="spacing" textLength="80.9009" x="29" y="519.6201">Al confirmar:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="412.8198" x="29" y="535.9717">&#8226; Se desactivar&#225; el acceso del investigador y se conservar&#225; su hist&#243;rico</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="276.9927" x="29" y="552.3232">&#8226; Se volver&#225; al listado de solicitudes actualizado</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="3.6118" x="29" y="568.6748">&#160;</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="242.0488" x="29" y="585.0264">y permite solicitar las siguientes acciones:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="148.3384" x="29" y="601.3779">&#8226; Confirmar desactivaci&#243;n</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="60.9185" x="29" y="617.7295">&#8226; Cancelar</text></g><!--link ConfirmandoDesactivacion to *end*eliminarPerfil--><g class="link" data-entity-1="ent0004" data-entity-2="ent0009" data-link-type="dependency" data-source-line="39" id="lnk10"><path d="M250,697.7094 C250,724.3794 250,761.1094 250,780.3094" fill="none" id="ConfirmandoDesactivacion-to-*end*eliminarPerfil" style="stroke:#008000;stroke-width:1;"/><polygon fill="#008000" points="250,785.3094,254,776.3094,250,780.3094,246,776.3094,250,785.3094" style="stroke:#008000;stroke-width:1;stroke-linejoin:miter;stroke-miterlimit:10;"/><path d="M255,720.6094 L255,762.6094 L586,762.6094 L586,730.6094 L576,720.6094 L255,720.6094" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M576,720.6094 L576,730.6094 L586,730.6094 L576,720.6094" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="700" lengthAdjust="spacing" textLength="77.9937" x="261" y="739.1045">Coordinador</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="179.9053" x="342.6055" y="739.1045">solicita confirmar desactivaci&#243;n</text><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="700" lengthAdjust="spacing" textLength="49.8608" x="261" y="755.4561">Sistema</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="256.5342" x="314.4727" y="755.4561">visualiza el listado de solicitudes actualizado</text></g><!--link ConfirmandoDesactivacion to MostrandoSolicitud--><g class="link" data-entity-1="ent0004" data-entity-2="ent0003" data-link-type="dep